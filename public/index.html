        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
      AN LLM PRACTICE PARODY PROJECT
    </a>
  </div>
</header>

<div class="stripes-bar" role="presentation"></div>

<main id="main-content">
<p id="loading">FETCHING LATEST DATA&hellip;</p>
<p id="error" role="alert"></p>
<div id="app" style="display:none"></div>
</main>

<div class="stripes-bar" role="presentation"></div>
<footer class="site-footer">★ LLM PRACTICE FOR FUN &middot; NOT AFFILIATED WITH THE FBI OR ANY GOVERNMENT AGENCY ★</footer>

<script>
// Generate star field
(function () {
  const field = document.getElementById('starField');
  for (let i = 0; i < 40; i++) {
    const s = document.createElement('span');
    s.textContent = '★';
    s.style.cssText = [
      'position:absolute',
      `left:${(i * 37) % 100}%`,
      `top:${(i * 23) % 100}%`,
      `font-size:${8 + (i % 3) * 4}px`,
      `animation:twinkle ${2 + (i % 3)}s ease-in-out infinite`,
      `animation-delay:${(i * 0.1).toFixed(1)}s`,
    ].join(';');
    field.appendChild(s);
  }
})();

async function load() {
  const loading = document.getElementById('loading');
  const errEl   = document.getElementById('error');
  const app     = document.getElementById('app');
  try {
    const r = await fetch('/data');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    loading.style.display = 'none';
    app.style.display = 'block';
    render(d, app);
  } catch (e) {
    loading.style.display = 'none';
    errEl.style.display = 'block';
    errEl.textContent = '⚠ Failed to load data: ' + e.message;
  }
}

function pill(text, cls) { return `<span class="pill ${cls}">${text}</span>`; }

function healthPill(val) {
  if (val === 'success' || val === 'healthy' || val === 'cached') return pill(val, 'pill-green');
  if (val === 'degraded') return pill(val, 'pill-amber');
  if (val === 'failed')   return pill(val, 'pill-red');
  return pill(val ?? 'unknown', 'pill-grey');
}

function fmtVol(v) {
  if (v == null) return '—';
  if (v >= 1e6) return '$' + (v / 1e6).toFixed(1) + 'M';
  if (v >= 1e3) return '$' + (v / 1e3).toFixed(0) + 'k';
  return '$' + Math.round(v);
}

function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function marketCard(source, data) {
  if (!data || !data.primary) return '';
  const p   = data.primary;
  const all = data.all_markets ?? [];
  const isPM    = source === 'polymarket';
  const badge   = isPM ? 'badge-pm'      : 'badge-kal';
  const fillCls = isPM ? 'prob-fill-pm'  : 'prob-fill-kal';
  const label   = isPM ? 'POLYMARKET'    : 'KALSHI';
  const pct     = Math.round((p.probability_yes ?? 0) * 100);

  let deltaBadge = '';
  if (p.prev_probability_yes != null) {
    const delta = Math.round((p.probability_yes - p.prev_probability_yes) * 100);
    if (delta !== 0) {
      const sign  = delta > 0 ? '+' : '';
      const color = delta > 0 ? '#B22234' : '#0a5c2e';
      deltaBadge = `<span style="font-family:'Oswald',sans-serif;font-size:.75rem;color:${color};margin-left:.4rem;letter-spacing:.05em">${sign}${delta}pp</span>`;
    }
  }

  const id     = `tl-${source}`;
  const others = all.filter(m => m.id !== p.id);
  let timelinesHtml = '';
  if (others.length) {
    const rows = others.map(m => {
      const mpct        = Math.round((m.probability_yes ?? 0) * 100);
      const statusLabel = m.status === 'resolved'
        ? (m.outcome ? `Resolved ${m.outcome.toUpperCase()}` : 'Resolved')
        : fmtDate(m.deadline);
      return `<div class="timeline-row">
        <span class="timeline-label">${m.question ?? m.deadline ?? '—'}</span>
        <div class="timeline-right">
          <span class="timeline-prob">${m.status === 'resolved' && m.outcome ? (m.outcome === 'yes' ? '✓ Yes' : '✗ No') : mpct + '%'}</span>
          <span class="timeline-status">${statusLabel}</span>
        </div>
      </div>`;
    }).join('');
    timelinesHtml = `
      <div>
        <button class="timelines-toggle" onclick="toggleTimelines('${id}')">
          <span id="${id}-arrow">▸</span> ${others.length} more timeline${others.length > 1 ? 's' : ''}
        </button>
        <div id="${id}" class="timelines-panel">${rows}</div>
      </div>`;
  }

  return `<div class="market-card">
    <div class="market-header">
      <span class="market-question">Will Kash Patel leave as FBI Director?</span>
      <span class="market-badge ${badge}">${label}</span>
    </div>
    <div>
      <div style="display:flex;align-items:baseline;gap:.25rem">
        <span class="market-prob">${pct}%</span>
        <span style="font-family:'Oswald',sans-serif;font-size:.8rem;color:#888;letter-spacing:.1em">YES${deltaBadge}</span>
      </div>
      <div class="prob-bar">
        <div class="${fillCls}" style="width:${pct}%"></div>
      </div>
    </div>
    <div class="market-meta">
      <div class="market-meta-item">DEADLINE <span>${fmtDate(p.deadline)}</span></div>
      <div class="market-meta-item">VOLUME <span>${fmtVol(p.volume_total)}</span></div>
      ${p.volume_24h != null ? `<div class="market-meta-item">24H VOL <span>${fmtVol(p.volume_24h)}</span></div>` : ''}
    </div>
    ${timelinesHtml}
    <div class="market-footer">
      <a href="${p.url}" target="_blank" rel="noopener" class="market-link">VIEW ON ${label} →</a>
      <span style="font-family:'Special Elite',monospace;font-size:.65rem;color:#bbb">${p.id ?? ''}</span>
    </div>
  </div>`;
}

function healthBar(label, val) {
  const map = {
    success:  { color: '#0a5c2e', pct: 100 },
    healthy:  { color: '#0a5c2e', pct: 100 },
    cached:   { color: '#0a5c2e', pct: 100 },
    degraded: { color: '#d4a017', pct: 55  },
    failed:   { color: '#B22234', pct: 15  },
  };
  const s = map[val] || { color: '#aaa', pct: 5 };
  return `<div class="health-bar-row">
    <span class="health-bar-label">${label}</span>
    <div class="health-bar-track"><div class="health-bar-fill" style="width:${s.pct}%;background:${s.color}"></div></div>
    <span class="health-bar-status" style="color:${s.color}">${val ?? 'unknown'}</span>
  </div>`;
}

function toggleTimelines(id) {
  const panel = document.getElementById(id);
  const arrow = document.getElementById(id + '-arrow');
  arrow.textContent = panel.classList.toggle('open') ? '▾' : '▸';
}

function render(d, root) {
  const v       = d.verdict           ?? {};
  const dep     = d.departure_info    ?? {};
  const meta    = d.metadata          ?? {};
  const health  = d.system_health     ?? {};
  const sources = d.sources           ?? [];
  const markets = d.markets           ?? {};
  const wa      = d.weekly_assessment ?? null;

  const verdict   = v.verdict ?? 'UNKNOWN';
  const bannerCls = verdict === 'YES' ? 'yes' : verdict === 'NO' ? 'no' : 'unknown';
  const vcCls     = verdict === 'YES' ? 'vc-yes' : verdict === 'NO' ? 'vc-no' : 'vc-unk';
  const pct       = Math.round((v.confidence ?? 0) * 100);
  const updatedAt = meta.last_updated ? new Date(meta.last_updated).toLocaleString() : '—';

  // Portrait image selection based on verdict + departure state
  const portraitSrc = dep.announced
    ? '/img/kash_fearful.png'
    : verdict === 'YES' ? '/img/kash_contemptuous.png'
    : verdict === 'NO'  ? '/img/kash_sad.png'
    : '/img/kash_surprised.png';
  const portraitColor = verdict === 'YES' ? '#0a5c2e' : verdict === 'NO' ? '#B22234' : '#888';

  // Departure block (right column, inside verdict card)
  const depColor = dep.announced ? '#B22234' : '#0a5c2e';
  const depBlockHtml = dep.announced
    ? `<div class="dep-block" style="border-color:${depColor}">
        <div class="dep-block-eyebrow">DEPARTURE STATUS</div>
        <div class="dep-block-status" style="color:${depColor}">⚠ ANNOUNCED</div>
        ${dep.departure_date   ? `<div class="dep-block-detail">Effective: <strong>${dep.departure_date}</strong></div>` : ''}
        ${dep.announced_by     ? `<div class="dep-block-detail">By: ${dep.announced_by}</div>` : ''}
        ${dep.announcement_date ? `<div class="dep-block-detail">On: ${dep.announcement_date}</div>` : ''}
        ${dep.announcement_summary ? `<div class="dep-block-detail" style="margin-top:6px;font-style:italic">${dep.announcement_summary}</div>` : ''}
      </div>`
    : `<div class="dep-block" style="border-color:${depColor}">
        <div class="dep-block-eyebrow">DEPARTURE STATUS</div>
        <div class="dep-block-status" style="color:${depColor}">✓ STILL IN OFFICE</div>
        <div class="dep-block-detail">No departure announced</div>
      </div>`;

  // 1. Verdict banner — YES/NO left · portrait center · departure right
  let html = `
    <div class="card verdict-card ${bannerCls}">
      <div class="verdict-eyebrow">TODAY'S VERDICT</div>
      <div class="verdict-top">
        <div class="verdict-stamp-col">
          <div class="verdict-word ${vcCls}">${verdict}</div>
        </div>
        <div class="verdict-portrait-wrap">
          <img src="${portraitSrc}" class="verdict-portrait" alt="Kash Patel" style="border-color:${portraitColor}">
          <div class="verdict-portrait-label">OFFICIAL PORTRAIT</div>
        </div>
        <div class="verdict-dep-col">
          ${depBlockHtml}
        </div>
      </div>
      <p class="verdict-summary">${v.summary ?? '—'}</p>
      <p class="verdict-reason" style="margin-top:.5rem">${v.reason ?? ''}</p>
      <div class="verdict-footer">
        <div style="display:flex;align-items:center;gap:.6rem">
          <div class="confidence-bar"><div class="confidence-fill" style="width:${pct}%"></div></div>
          <span style="font-family:'Oswald',sans-serif;font-size:.7rem;color:#888;letter-spacing:.1em">CONFIDENCE: ${pct}%</span>
        </div>
        <span style="font-family:'Special Elite',monospace;font-size:.72rem;color:#888">Last updated: ${updatedAt}</span>
      </div>
    </div>`;

  // 3. Prediction markets + weekly pulse
  const pmCard  = marketCard('polymarket', markets.polymarket);
  const kalCard = marketCard('kalshi',     markets.kalshi);

  // 3a. Live prediction markets card
  if (pmCard || kalCard) {
    html += `
    <div class="card">
      <div class="section-heading">
        <h2>📊 THE SMART MONEY SAYS</h2>
        <div class="sub">LIVE PREDICTION MARKET ODDS</div>
      </div>
      <div class="markets-grid">
        ${pmCard}
        ${kalCard}
      </div>
    </div>`;
  }

  // 3b. Last week's market pulse — separate card
  const fmtWeekDate = iso => {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  };

  if (wa && (wa.weekly_take || wa.price_summary)) {
    const driverColors = { news: '#d4a017', time_decay: '#0a1747', mixed: '#6b21a8', unclear: '#888' };
    const driverColor  = driverColors[wa.driver] || '#888';
    const dirArrow     = wa.direction === 'up' ? '↑' : wa.direction === 'down' ? '↓' : '→';
    const dirColor     = wa.direction === 'up' ? '#B22234' : wa.direction === 'down' ? '#0a5c2e' : '#888';

    const wStartFmt  = fmtWeekDate(wa.week_start || wa.week_of);
    const wEndFmt    = fmtWeekDate(wa.week_end);
    const weekLabel  = wStartFmt && wEndFmt ? `${wStartFmt} — ${wEndFmt}` : wStartFmt;
    const generatedAt = wa.generated_at ? new Date(wa.generated_at).toLocaleString() : null;

    const fmtPct   = v => v != null ? (v * 100).toFixed(1) + '%' : '—';
    const fmtDelta = v => {
      if (v == null) return '—';
      const pts = v * 100;
      return (pts >= 0 ? '+' : '') + pts.toFixed(1) + 'pts';
    };
    const mkRow = (label, open, close, delta) => {
      const dc = delta > 0.001 ? '#B22234' : delta < -0.001 ? '#0a5c2e' : '#888';
      return `<div class="weekly-market-row">
        <span class="weekly-mkt-label">${label}</span>
        <span class="weekly-mkt-val">${fmtPct(open)}</span>
        <span class="weekly-mkt-arrow">→</span>
        <span class="weekly-mkt-val">${fmtPct(close)}</span>
        <span class="weekly-mkt-delta" style="color:${dc}">${fmtDelta(delta)}</span>
      </div>`;
    };

    let marketRows = '';
    if (wa.kalshi_open     != null) marketRows += mkRow('KALSHI',     wa.kalshi_open,     wa.kalshi_close,     wa.kalshi_delta);
    if (wa.polymarket_open != null) marketRows += mkRow('POLYMARKET', wa.polymarket_open, wa.polymarket_close, wa.polymarket_delta);

    html += `
    <div class="card">
      <div class="section-heading" style="margin-bottom:1rem">
        <h2>📅 LAST WEEK'S MARKET PULSE</h2>
        <div class="sub">RETROSPECTIVE · PRIOR CALENDAR WEEK${weekLabel ? ' · ' + weekLabel : ''}</div>
      </div>
      ${marketRows}
      <div class="weekly-divider"></div>
      <p style="font-size:.95rem;color:#333;line-height:1.65;margin-bottom:.6rem">${wa.weekly_take ?? ''}</p>
      <p style="font-family:'Special Elite',monospace;font-size:.8rem;color:#666;font-style:italic;line-height:1.5">${wa.driver_summary ?? ''}</p>
      <div class="verdict-footer" style="margin-top:.9rem">
        <div class="meta-row">
          <div class="meta-item">DRIVER <span style="color:${driverColor}">${wa.driver ?? '—'}</span></div>
          <div class="meta-item">DIRECTION <span style="color:${dirColor}">${dirArrow} ${wa.direction ?? '—'}</span></div>
          ${wa.markets_agree != null ? `<div class="meta-item">MARKETS AGREE <span>${wa.markets_agree ? 'Yes' : 'No'}</span></div>` : ''}
          ${wa.snapshots_used != null ? `<div class="meta-item">DAYS USED <span>${wa.snapshots_used}</span></div>` : ''}
        </div>
        ${generatedAt ? `<span style="font-family:'Special Elite',monospace;font-size:.72rem;color:#888">Generated: ${generatedAt}</span>` : ''}
      </div>
    </div>`;
  } else {
    html += `
    <div class="card" style="opacity:.45">
      <div class="section-heading" style="margin-bottom:1rem">
        <h2>📅 LAST WEEK'S MARKET PULSE</h2>
        <div class="sub">RETROSPECTIVE · GENERATES EVERY SUNDAY AT 06:00 UTC</div>
      </div>
      <p style="font-size:.85rem;color:#666;line-height:1.6">
        Pending — collects one snapshot per day and publishes every Sunday morning.<br>
        Run <code style="font-family:'Special Elite',monospace;font-size:.8rem;color:#888">python kash_weekly.py</code> to generate from available snapshots.
      </p>
    </div>`;
  }

  // 4. System health
  const tokens = health.token_usage ?? {};
  html += `
    <div class="card">
      <h2>SYSTEM HEALTH</h2>
      ${healthBar('STATUS', health.status)}
      ${healthBar('RSS', health.rss_fetch)}
      ${healthBar('JINA', health.jina_reader)}
      ${healthBar('LLM', health.llm_inference)}
      <div class="meta-row" style="margin-top:.9rem;padding-top:.75rem;border-top:1px solid #e0ddd4">
        <div class="meta-item">PROVIDER <span>${health.llm_provider ?? '—'}</span></div>
        <div class="meta-item">TOKENS IN <span>${tokens.prompt_tokens ?? '—'}</span></div>
        <div class="meta-item">TOKENS OUT <span>${tokens.completion_tokens ?? '—'}</span></div>
        <div class="meta-item">RUN TIME <span>${meta.execution_time_ms ? meta.execution_time_ms + ' ms' : '—'}</span></div>
        <div class="meta-item">RUN ID <span>${meta.github_run_id ?? '—'}</span></div>
      </div>
    </div>`;

  // 5. Sources — sorted newest first
  if (sources.length) {
    const sorted = [...sources].sort((a, b) => {
      const da = a.published_at ? new Date(a.published_at) : new Date(0);
      const db = b.published_at ? new Date(b.published_at) : new Date(0);
      return db - da;
    });
    const rows = sorted.map(s =>
      `<li style="animation:slideIn .5s ease forwards;opacity:0">
         <a href="${s.url}" target="_blank" rel="noopener">${s.title}</a>
         <span style="font-family:'Special Elite',monospace;color:#888;font-size:.8rem"> &mdash; ${s.published_at ?? ''}</span>
       </li>`
    ).join('');
    html += `
    <div class="card" style="border-left:6px solid #B22234">
      <div class="section-heading" style="margin-bottom:16px">
        <h2>📰 SOURCES (${sources.length})</h2>
      </div>
      <ul style="padding-left:1.2rem">${rows}</ul>
    </div>`;
  }

  root.innerHTML = html;
}

load();
</script>
</body>
</html>
